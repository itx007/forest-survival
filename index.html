<!DOCTYPE html>

    <title>Dr Dark: Pro Edition V15</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body { margin: 0; background: #000; font-family: 'Orbitron', sans-serif; overflow: hidden; color: #fff; }
        
        #ui { position: absolute; top: 0; width: 100%; padding: 10px; z-index: 50; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .branding { font-size: 0.7rem; color: #0f0; text-align: center; letter-spacing: 2px; }
        .stats { display: flex; justify-content: space-between; padding: 5px 15px; font-size: 1rem; }
        .hb-container { width: 80%; height: 6px; background: #222; border-radius: 3px; margin: 5px auto; overflow: hidden; }
        #hp { width: 100%; height: 100%; background: #0f0; transition: 0.3s; }

        canvas { display: block; width: 100vw; height: 100vh; }

        /* Floating Shop Icons - Pro Placement */
        .side-shop { position: absolute; right: 10px; top: 20%; display: flex; flex-direction: column; gap: 12px; z-index: 60; }
        .icon-btn { width: 45px; height: 45px; background: rgba(0,255,0,0.1); border: 1.5px solid #0f0; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.2rem; box-shadow: 0 0 10px rgba(0,255,0,0.3); }
        .icon-price { font-size: 0.4rem; color: #ff0; }

        /* Pro Controller Layout */
        .controls-container { position: absolute; bottom: 30px; width: 100%; height: 160px; pointer-events: none; z-index: 100; }
        .joystick-zone { position: absolute; left: 20px; bottom: 0; width: 150px; height: 150px; display: grid; grid-template-columns: repeat(3, 1fr); pointer-events: auto; }
        .action-zone { position: absolute; right: 30px; bottom: 10px; width: 100px; height: 100px; pointer-events: auto; }

        .ctrl-btn { background: rgba(0,255,0,0.1); border: 1px solid rgba(0,255,0,0.4); border-radius: 12px; color: rgba(0,255,0,0.6); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
        .ctrl-btn:active { background: rgba(0,255,0,0.3); color: #fff; }
        
        .up { grid-column: 2; grid-row: 1; }
        .left { grid-column: 1; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
        .down { grid-column: 2; grid-row: 3; }

        .shoot-btn { width: 90px; height: 90px; background: rgba(255,0,0,0.15); border: 2px solid #f00; border-radius: 50%; color: #f00; font-size: 2.2rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(255,0,0,0.4); }
        .shoot-btn:active { transform: scale(0.9); background: rgba(255,0,0,0.4); }
    </style>
</head>
<body>
    <div id="ui">
        <div class="branding">DOCTOR DARK • PRO V15</div>
        <div class="stats">
            <div>SC: <span id="sc">0</span></div>
            <div>💰: <span id="coins">0</span></div>
        </div>
        <div class="hb-container"><div id="hp"></div></div>
    </div>

    <div class="side-shop">
        <div class="icon-btn" onclick="buy('gun')">🔫<span class="icon-price">50💰</span></div>
        <div class="icon-btn" onclick="buy('nitro')">🏎️<span class="icon-price">100💰</span></div>
        <div class="icon-btn" onclick="buy('shield')">🛡️<span class="icon-price">75💰</span></div>
    </div>

    <canvas id="c"></canvas>

    <div class="controls-container">
        <div class="joystick-zone">
            <div class="ctrl-btn up" ontouchstart="m('u')">▲</div>
            <div class="ctrl-btn left" ontouchstart="m('l')">◀</div>
            <div class="ctrl-btn right" ontouchstart="m('r')">▶</div>
            <div class="ctrl-btn down" ontouchstart="m('d')">▼</div>
        </div>
        <div class="action-zone">
            <div class="shoot-btn" ontouchstart="shoot()">🔥</div>
        </div>
    </div>

        let s=0, h=100, live=true, b=null, night=false, totalCoins=0, frame=0;
        let gunLevel=1, nitroActive=false, shieldActive=false;
        let p={x:c.width/2, y:c.height/2};
        let enemies=[{x:0, y:0, t:'🐺'}, {x:c.width, y:c.height, t:'🧟'}]; 
        let objects={coin:{x:600, y:600}, h:{x:300, y:300
    <div class="side-shop">

    <div class="controls">

        <div class="btn" style="grid-column: 1" ontouchstart="m('l')">◀</div>
        <div class="btn" style="grid-column: 3" ontouchstart="m('r')">▶</div>

        <div class="btn" style="grid-column: 2" ontouchstart="m('d')">▼</div>

    <script>
        const c=document.getElementById('c'), x=c.getContext('2d');
        const ac = new (window.AudioContext || window.webkitAudioContext)();
        c.width=window.innerWidth*2; c.height=(window.innerHeight*0.60)*2;

        let s=0, h=100, live=true, b=null, night=false, totalCoins=0, frame=0;
        let gunLevel=1, nitroActive=false, shieldActive=false;
        let p={x:c.width/2, y:c.height/2};
        // Enemies start further away now
        let enemies=[{x:0, y:0, t:'🐺'}, {x:c.width, y:c.height, t:'🧟'}]; 
        let objects={coin:{x:500, y:500}, h:{x:300, y:300}, car:{x:c.width-400, y:200, d:false}};

        function sound(f, t, d) {
            let o=ac.createOscillator(), g=ac.createGain();
            o.type=t; o.frequency.value=f; o.connect(g); g.connect(ac.destination);
            o.start(); g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+d); o.stop(ac.currentTime+d);
        }

        setInterval(()=> { night=!night; if(night) sound(100,'sine',0.4); }, 15000);

        function draw() {
            if(!live) return; frame++;
            x.fillStyle="#000"; x.fillRect(0,0,c.width,c.height);
            let wobble=Math.sin(frame*0.1)*8;
            
            let grad=x.createRadialGradient(p.x, p.y, 50, p.x, p.y, night?500:1200);
            grad.addColorStop(0, night?'rgba(70,70,0,0.4)':'rgba(0,40,0,0.15)');
            grad.addColorStop(1, '#000');
            x.fillStyle=grad; x.fillRect(0,0,c.width,c.height);

            x.font="170px serif"; x.fillText("🏠", objects.h.x, objects.h.y);
            x.font="110px serif"; x.fillText("💰", objects.coin.x, objects.coin.y+wobble);
            if(!objects.car.d) { x.font="135px serif"; x.fillText("🏎️", objects.car.x, objects.car.y); }

            enemies.forEach(e => {
                let dx=p.x-e.x, dy=p.y-e.y, dist=Math.sqrt(dx*dx+dy*dy);
                let inHomeZone = Math.sqrt((e.x-objects.h.x)**2+(e.y-objects.h.y)**2)<200;
                
                // Slower movement if too close or in home zone
                if(!inHomeZone) {
                    e.x+=dx/(night?50:80); e.y+=dy/(night?50:80);
                }
                
                x.font="145px serif"; x.fillText(e.t, e.x, e.y+wobble);
                if(dist<110 && !shieldActive && !objects.car.d) { 
                    h-=1.5; // Reduced damage
                    if(navigator.vibrate) navigator.vibrate(30); 
                }
            });

            if(shieldActive) { x.beginPath(); x.arc(p.x+70, p.y-70, 110, 0, Math.PI*2); x.strokeStyle="#0ff"; x.lineWidth=4; x.stroke(); }
            x.font="150px serif"; x.fillText(objects.car.d?"🏎️":"🏃‍♂️", p.x, p.y+wobble);

            if(b) {
                b.x+=b.vx; b.y+=b.vy; x.fillStyle=gunLevel>1?"#0ff":"#f00";
                x.beginPath(); x.arc(b.x,b.y,20,0,Math.PI*2); x.fill();
                enemies.forEach((e,i)=>{
                    if(Math.sqrt((b.x-e.x)**2+(b.y-e.y)**2)<130) { s+=5000; sound(400,'square',0.1); enemies[i].x=Math.random()*c.width; enemies[i].y=Math.random()>0.5?0:c.height; b=null; }
                });
                if(b&&(b.x<0||b.x>c.width||b.y<0||b.y>c.height)) b=null;
            }

            if(Math.sqrt((p.x-objects.coin.x)**2+(p.y-objects.coin.y)**2)<110) { 
                totalCoins+=10; sound(1000,'sine',0.1); objects.coin={x:Math.random()*c.width,y:Math.random()*c.height}; 
                document.getElementById('coins').innerText=totalCoins;
            }

            document.getElementById('hp').style.width=h+"%";
            if(h<=0) { live=false; alert("GAME OVER! DR DARK SC: "+Math.floor(s/10)); location.reload(); }
            s++; document.getElementById('sc').innerText=Math.floor(s/10);
            requestAnimationFrame(draw);
        }

        function m(v) {
            let sp=objects.car.d?(nitroActive?280:200):115;
            if(v=='u' && p.y>100)p.y-=sp; if(v=='d' && p.y<c.height-100)p.y+=sp; 
            if(v=='l' && p.x>100)p.x-=sp; if(v=='r' && p.x<c.width-100)p.x+=sp;
        }

        function buy(it) {
            if(it=='gun' && totalCoins>=50) { gunLevel=2; totalCoins-=50; sound(1200,'sine',0.2); }
            if(it=='nitro' && totalCoins>=100) { nitroActive=true; totalCoins-=100; sound(1200,'sine',0.2); }
            if(it=='shield' && totalCoins>=75) { shieldActive=true; totalCoins-=75; sound(1500,'sine',0.3); setTimeout(()=>shieldActive=false,10000); }
            document.getElementById('coins').innerText=totalCoins;
        }

        function shoot() {
            if(objects.car.d) { objects.car.d=false; objects.car.x=p.x+150; return; }
            if(!b) { sound(500,'square',0.1); let sp=gunLevel>1?5:8; b={x:p.x,y:p.y,vx:(enemies[0].x-p.x)/sp, vy:(enemies[0].y-p.y)/sp}; }
        }
        draw();
    </script>
</body>

    <script>
        const c=document.getElementById('c'), x=c.getContext('2d');
        const ac = new (window.AudioContext || window.webkitAudioContext)();
        c.width=window.innerWidth*2; c.height=(window.innerHeight*0.60)*2;

        let s=0, h=100, live=true, b=null, night=false, totalCoins=0, frame=0;
        let gunLevel=1, nitroActive=false, shieldActive=false, raining=false;
        let p={x:c.width/2, y:c.height/2};
        let enemies=[{x:100, y:100, t:'🐺'}, {x:c.width-100, y:c.height-100, t:'🧟'}]; 
        let objects={f:{x:c.width-300, y:c.height-300}, coin:{x:400, y:400}, h:{x:250, y:250}, car:{x:c.width-400, y:200, d:false}};
        let drops=Array.from({length:30},()=>({x:Math.random()*c.width, y:Math.random()*c.height, v:15+Math.random()*10}));

        function sound(f, t, d) {
            let o=ac.createOscillator(), g=ac.createGain();
            o.type=t; o.frequency.value=f; o.connect(g); g.connect(ac.destination);
            o.start(); g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+d); o.stop(ac.currentTime+d);
        }

        setInterval(()=> { night=!night; raining=Math.random()>0.5; if(night) sound(100,'sine',0.5); }, 15000);

        function draw() {
            if(!live) return; frame++;
            x.fillStyle="#000"; x.fillRect(0,0,c.width,c.height);
            let wobble=Math.sin(frame*0.1)*8;
            
            let grad=x.createRadialGradient(p.x, p.y, 50, p.x, p.y, night?450:1100);
            grad.addColorStop(0, night?'rgba(60,60,0,0.4)':'rgba(0,50,0,0.2)');
            grad.addColorStop(1, '#000');
            x.fillStyle=grad; x.fillRect(0,0,c.width,c.height);

            if(raining) {
                x.strokeStyle="rgba(100,200,255,0.4)"; x.lineWidth=2;
                drops.forEach(d=>{ x.beginPath(); x.moveTo(d.x, d.y); x.lineTo(d.x, d.y+20); x.stroke(); d.y+=d.v; if(d.y>c.height) d.y=-20; });
            }

            x.font="170px serif"; x.fillText("🏠", objects.h.x, objects.h.y);
            x.font="110px serif"; x.fillText("💰", objects.coin.x, objects.coin.y+wobble);
            if(!objects.car.d) { x.font="130px serif"; x.fillText("🏎️", objects.car.x, objects.car.y); }

            enemies.forEach(e => {
                let dx=p.x-e.x, dy=p.y-e.y, dist=Math.sqrt(dx*dx+dy*dy);
                e.x+=dx/(night?35:55); e.y+=dy/(night?35:55);
                x.font="140px serif"; x.fillText(e.t, e.x, e.y+wobble);
                if(dist<120 && !shieldActive && !objects.car.d) { h-=2; sound(60,'square',0.1); if(navigator.vibrate) navigator.vibrate(40); }
            });

            if(shieldActive) { x.beginPath(); x.arc(p.x+70, p.y-70, 100, 0, Math.PI*2); x.strokeStyle="#0ff"; x.lineWidth=5; x.stroke(); }
            x.font="145px serif"; x.fillText(objects.car.d?"🏎️":"🏃‍♂️", p.x, p.y+wobble);

            if(b) {
                b.x+=b.vx; b.y+=b.vy; x.fillStyle=gunLevel>1?"#0ff":"#f00";
                x.beginPath(); x.arc(b.x,b.y,20,0,Math.PI*2); x.fill();
                enemies.forEach((e,i)=>{
                    if(Math.sqrt((b.x-e.x)**2+(b.y-e.y)**2)<130) { s+=5000; sound(400,'square',0.1); enemies[i].x=Math.random()*c.width; enemies[i].y=0; b=null; }
                });
                if(b&&(b.x<0||b.x>c.width||b.y<0||b.y>c.height)) b=null;
            }

            if(Math.sqrt((p.x-objects.coin.x)**2+(p.y-objects.coin.y)**2)<110) { 
                totalCoins+=10; sound(1000,'sine',0.1); objects.coin={x:Math.random()*c.width,y:Math.random()*c.height}; 
                document.getElementById('coins').innerText=totalCoins;
            }

            document.getElementById('hp').style.width=h+"%";
            document.getElementById('hp').style.background=h<30?"#f00":"#0f0";
            if(h<=0) { live=false; alert("GAME OVER! SCORE: "+Math.floor(s/10)); location.reload(); }
            s++; document.getElementById('sc').innerText=Math.floor(s/10);
            requestAnimationFrame(draw);
        }

        function m(v) {
            let sp=objects.car.d?(nitroActive?280:200):110;
            if(v=='u')p.y-=sp; if(v=='d')p.y+=sp; if(v=='l')p.x-=sp; if(v=='r')p.x+=sp;
        }

        function buy(it) {
            if(it=='gun' && totalCoins>=50) { gunLevel=2; totalCoins-=50; sound(1200,'sine',0.3); }
            if(it=='nitro' && totalCoins>=100) { nitroActive=true; totalCoins-=100; sound(1200,'sine',0.3); }
            if(it=='shield' && totalCoins>=75) { shieldActive=true; totalCoins-=75; sound(1500,'sine',0.4); setTimeout(()=>shieldActive=false,10000); }
            document.getElementById('coins').innerText=totalCoins;
        }

        function shoot() {
            if(objects.car.d) { objects.car.d=false; objects.car.x=p.x+150; return; }
            if(!b) { sound(500,'square',0.1); let sp=gunLevel>1?5:8; b={x:p.x,y:p.y,vx:(enemies[0].x-p.x)/sp, vy:(enemies[0].y-p.y)/sp}; }
        }
        draw();

    <div class="controls">
        <div class="btn up" ontouchstart="m('u')">▲</div>
        <div class="btn left" ontouchstart="m('l')">◀</div>

    <script>
        const c=document.getElementById('c'), x=c.getContext('2d');
        const ac = new (window.AudioContext || window.webkitAudioContext)();
        c.width=window.innerWidth*2; c.height=(window.innerHeight*0.60)*2;

        let s=0, h=100, live=true, b=null, night=false, totalCoins=0, frame=0;
        let gunLevel=1, nitroActive=false;
        let p={x:c.width/2, y:c.height/2};
        let wolves=[{x:200, y:200}, {x:c.width-200, y:c.height-200}]; 
        let f={x:c.width-300, y:c.height-300}, coin={x:450, y:450}, house={x:250, y:250}, car={x:c.width-400, y:250, drive:false};
        let med={x:Math.random()*c.width, y:Math.random()*c.height, active:true};
        let t=Array.from({length:10},()=>({x:Math.random()*c.width, y:Math.random()*c.height, sz:140}));

        function sound(freq, type, dur) {
            let osc = ac.createOscillator(); let g = ac.createGain();
            osc.type = type; osc.frequency.value = freq;
            osc.connect(g); g.connect(ac.destination);
            osc.start(); g.gain.exponentialRampToValueAtTime(0.00001, ac.currentTime + dur);
            osc.stop(ac.currentTime + dur);
        }

        setInterval(() => { night = !night; if(night) sound(100, 'sine', 0.5); }, 20000);

        function draw() {
            if(!live) return;
            frame++;
            x.fillStyle="#000"; x.fillRect(0,0,c.width,c.height);
            let wobble = Math.sin(frame * 0.1) * 8;
            let grad = x.createRadialGradient(p.x, p.y, 50, p.x, p.y, night?400:1200);
            grad.addColorStop(0, night ? 'rgba(70,70,0,0.5)' : 'rgba(0,60,0,0.3)');
            grad.addColorStop(1, '#000');
            x.fillStyle = grad; x.fillRect(0,0,c.width,c.height);

            t.forEach(i=>{ x.font=i.sz+"px serif"; x.fillText("🌲",i.x,i.y); });
            x.font="170px serif"; x.fillText("🏠",house.x,house.y);
            x.font="130px serif"; x.fillText("🔥",f.x,f.y + (wobble/2));
            x.font="100px serif"; x.fillText("💰",coin.x,coin.y + wobble);
            if(med.active){ x.font="90px serif"; x.fillText("💊",med.x,med.y - wobble); }
            if(!car.drive) { x.font="135px serif"; x.fillText("🏎️",car.x,car.y); }

            let inH = Math.sqrt((p.x-house.x-70)**2+(p.y-house.y+70)**2)<150;
            let nearF = Math.sqrt((p.x-f.x)**2+(p.y-f.y)**2)<200;
            if(!car.drive && Math.sqrt((p.x-car.x)**2+(p.y-car.y)**2)<120) { car.drive=true; sound(180, 'sawtooth', 0.4); }
            if(med.active && Math.sqrt((p.x-med.x)**2+(p.y-med.y)**2)<100){ h=Math.min(100, h+35); med.active=false; sound(800, 'sine', 0.3); setTimeout(()=>med.active=true, 15000); }

            wolves.forEach(w => {
                let dx=p.x-w.x, dy=p.y-w.y, d=Math.sqrt(dx*dx+dy*dy);
                if(!inH) { w.x+=dx/(night?30:60); w.y+=dy/(night?30:60); }
                x.font = "140px serif"; x.fillText("🐺", w.x, w.y + wobble);
                if(d < 120 && !inH && !nearF && !car.drive) { 
                    h-=3.5; sound(60, 'square', 0.1); 
                    if(navigator.vibrate) navigator.vibrate(50);
                }
            });

            x.font="145px serif"; x.fillText(car.drive ? "🏎️" : "🏃‍♂️", p.x, p.y + (car.drive ? 0 : wobble));

            if(b) {
                b.x+=b.vx; b.y+=b.vy; x.fillStyle=gunLevel>1 ? "#0ff" : "#f00"; 
                x.beginPath(); x.arc(b.x,b.y,25,0,Math.PI*2); x.fill();
                wolves.forEach((w, i) => {
                    if(Math.sqrt((b.x-w.x)**2+(b.y-w.y)**2)<130) { s+=5000; sound(400, 'square', 0.15); wolves[i]={x:Math.random()*c.width, y:0}; b=null; }
                });
                if(b && (b.x<0||b.x>c.width||b.y<0||b.y>c.height)) b=null;
            }

            if(Math.sqrt((p.x-coin.x)**2+(p.y-coin.y)**2)<110) { 
                totalCoins+=10; sound(1100, 'sine', 0.1);
                coin={x:Math.random()*c.width, y:Math.random()*c.height}; 
                document.getElementById('coins').innerText=totalCoins; 
            }
            if(inH && h<100) h+=0.5;
            document.getElementById('hp').style.width=h+"%";
            if(h<=0) { live=false; alert("GAME OVER! DR DARK SC: "+Math.floor(s/10)); location.reload(); }
            s++; document.getElementById('sc').innerText=Math.floor(s/10);
            requestAnimationFrame(draw);
        }

        function m(v) {
            let sp = car.drive ? (nitroActive ? 300 : 220) : 110;
            if(v=='u' && p.y>100) p.y-=sp; if(v=='d' && p.y<c.height-100) p.y+=sp;
            if(v=='l' && p.x>100) p.x-=sp; if(v=='r' && p.x<c.width-100) p.x+=sp;
        }

        function buy(item) {
            if(item=='gun' && totalCoins>=50) { gunLevel=2; totalCoins-=50; sound(1500, 'sine', 0.3); alert("LASER GUN!"); }
            if(item=='nitro' && totalCoins>=100) { nitroActive=true; totalCoins-=100; sound(1500, 'sine', 0.3); alert("NITRO CAR!"); }
            document.getElementById('coins').innerText=totalCoins;
        }

        function shoot() {
            if(car.drive) { car.drive=false; car.x=p.x+180; car.y=p.y; return; }
            if(!b) { sound(550, 'square', 0.1); let bSpeed = gunLevel > 1 ? 4 : 8; b={x:p.x, y:p.y, vx:(wolves[0].x-p.x)/bSpeed, vy:(wolves[0].y-p.y)/bSpeed}; }
        }
        draw();
    </script>
</body>
</html>
    <canvas id="c"></canvas>
    <div class="shop">
        <button class="shop-btn" onclick="buy('gun')">GUN UP (50💰)</button>
        <button class="shop-btn" onclick="buy('nitro')">NITRO (100💰)</button>
    </div>
    <div class="controls">
        <div class="btn up" ontouchstart="m('u')">▲</div>
        <div class="btn left" ontouchstart="m('l')">◀</div>
        <div class="btn down" ontouchstart="m('d')">▼</div>
        <div class="btn right" ontouchstart="m('r')">▶</div>
        <div class="btn shoot-btn shoot" ontouchstart="shoot()">🔥</div>
    </div>

    <script>
        const c=document.getElementById('c'), x=c.getContext('2d');
        const ac = new (window.AudioContext || window.webkitAudioContext)();
        c.width=window.innerWidth*2; c.height=(window.innerHeight*0.55)*2;

        let s=0, h=100, live=true, b=null, night=false, totalCoins=0, frame=0;
        let gunLevel=1, nitroActive=false, bestScore = localStorage.getItem('drDarkBest') || 0;
        document.getElementById('best').innerText = bestScore;

        let p={x:c.width/2, y:c.height/2};
        let wolves=[{x:200, y:200}, {x:c.width-200, y:c.height-200}]; 
        let f={x:c.width-300, y:c.height-300}, coin={x:400, y:400}, house={x:250, y:250}, car={x:c.width-400, y:250, drive:false};
        let med={x:Math.random()*c.width, y:Math.random()*c.height, active:true};
        let t=Array.from({length:10},()=>({x:Math.random()*c.width, y:Math.random()*c.height, sz:140}));

        function sound(freq, type, dur) {
            let osc = ac.createOscillator(); let g = ac.createGain();
            osc.type = type; osc.frequency.value = freq;
            osc.connect(g); g.connect(ac.destination);
            osc.start(); g.gain.exponentialRampToValueAtTime(0.00001, ac.currentTime + dur);
            osc.stop(ac.currentTime + dur);
        }

        setInterval(() => { night = !night; if(night) sound(120, 'sine', 0.5); }, 20000);

        function draw() {
            if(!live) return;
            frame++;
            x.fillStyle="#000"; x.fillRect(0,0,c.width,c.height);
            let wobble = Math.sin(frame * 0.1) * 8;
            let grad = x.createRadialGradient(p.x, p.y, 50, p.x, p.y, night?400:1200);
            grad.addColorStop(0, night ? 'rgba(70,70,0,0.5)' : 'rgba(0,60,0,0.3)');
            grad.addColorStop(1, '#000');
            x.fillStyle = grad; x.fillRect(0,0,c.width,c.height);

            t.forEach(i=>{ x.font=i.sz+"px serif"; x.fillText("🌲",i.x,i.y); });
            x.font="170px serif"; x.fillText("🏠",house.x,house.y);
            x.font="130px serif"; x.fillText("🔥",f.x,f.y + (wobble/2));
            x.font="100px serif"; x.fillText("💰",coin.x,coin.y + wobble);
            if(med.active){ x.font="90px serif"; x.fillText("💊",med.x,med.y - wobble); }
            if(!car.drive) { x.font="135px serif"; x.fillText("🏎️",car.x,car.y); }

            let inH = Math.sqrt((p.x-house.x-70)**2+(p.y-house.y+70)**2)<150;
            let nearF = Math.sqrt((p.x-f.x)**2+(p.y-f.y)**2)<200;
            if(!car.drive && Math.sqrt((p.x-car.x)**2+(p.y-car.y)**2)<120) { car.drive=true; sound(180, 'sawtooth', 0.4); }
            
            if(med.active && Math.sqrt((p.x-med.x)**2+(p.y-med.y)**2)<100){ 
                h=Math.min(100, h+35); med.active=false; sound(800, 'sine', 0.3);
                setTimeout(()=>med.active=true, 15000); 
            }

            wolves.forEach(w => {
                let dx=p.x-w.x, dy=p.y-w.y, d=Math.sqrt(dx*dx+dy*dy);
                if(!inH) { w.x+=dx/(night?30:60); w.y+=dy/(night?30:60); }
                x.font = "140px serif"; x.fillText("🐺", w.x, w.y + wobble);
                if(d < 120 && !inH && !nearF && !car.drive) { 
                    h-=3; sound(60, 'square', 0.1); 
                    if(navigator.vibrate) navigator.vibrate(50);
                }
            });

            x.font="145px serif"; x.fillText(car.drive ? "🏎️" : "🏃‍♂️", p.x, p.y + (car.drive ? 0 : wobble));

            if(b) {
                b.x+=b.vx; b.y+=b.vy; x.fillStyle=gunLevel>1 ? "#0ff" : "#f00"; 
                x.beginPath(); x.arc(b.x,b.y,25,0,Math.PI*2); x.fill();
                wolves.forEach((w, i) => {
                    if(Math.sqrt((b.x-w.x)**2+(b.y-w.y)**2)<130) { 
                        s+=5000; sound(400, 'square', 0.15);
                        wolves[i]={x:Math.random()*c.width, y:0}; b=null; 
                    }
                });
                if(b && (b.x<0||b.x>c.width||b.y<0||b.y>c.height)) b=null;
            }

            if(Math.sqrt((p.x-coin.x)**2+(p.y-coin.y)**2)<110) { 
                totalCoins+=10; sound(1100, 'sine', 0.1);
                coin={x:Math.random()*c.width, y:Math.random()*c.height}; 
                document.getElementById('coins').innerText=totalCoins; 
            }
            if(inH && h<100) h+=0.5;
            document.getElementById('hp').style.width=h+"%";
            
            if(h<=0) { 
                live=false; 
                let finalScore = Math.floor(s/10);
                if(finalScore > bestScore) localStorage.setItem('drDarkBest', finalScore);
                alert("GAME OVER! SCORE: "+finalScore); location.reload(); 
            }
            s++; document.getElementById('sc').innerText=Math.floor(s/10);
            if(Math.floor(s/10) % 500 === 0 && s > 0) sound(1500, 'sine', 0.2);
            requestAnimationFrame(draw);
        }

        function m(v) {
            let sp = car.drive ? (nitroActive ? 300 : 220) : 110;
            if(v=='u' && p.y>100) p.y-=sp; if(v=='d' && p.y<c.height-100) p.y+=sp;
            if(v=='l' && p.x>100) p.x-=sp; if(v=='r' && p.x<c.width-100) p.x+=sp;
        }

        function buy(item) {
            if(item=='gun' && totalCoins>=50) { gunLevel=2; totalCoins-=50; alert("LASER GUN!"); }
            if(item=='nitro' && totalCoins>=100) { nitroActive=true; totalCoins-=100; alert("NITRO CAR!"); }
            document.getElementById('coins').innerText=totalCoins;
        }

        function shoot() {
            if(car.drive) { car.drive=false; car.x=p.x+180; car.y=p.y; return; }
            if(!b) {
                sound(550, 'square', 0.1);
                let bSpeed = gunLevel > 1 ? 4 : 8;
                b={x:p.x, y:p.y, vx:(wolves[0].x-p.x)/bSpeed, vy:(wolves[0].y-p.y)/bSpeed};
            }
        }
        draw();
    </script>
</body>
</html>
