<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doctor Dark: Fire Survival</title>
    <style>
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: #fff; }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 10; }
        .bar-bg { width: 220px; height: 18px; background: #222; border: 2px solid #0f0; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        #hp { width: 100%; height: 100%; background: linear-gradient(90deg, #f00, #ff4500); transition: 0.2s; }
        .score { color: #0f0; font-weight: bold; font-size: 1.4rem; text-shadow: 0 0 10px #0f0; }
        canvas { display: block; width: 100%; height: 75vh; background: #031003; border-bottom: 3px solid #0f0; }
        .controls { position: absolute; bottom: 3%; width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); justify-items: center; gap: 10px; padding: 0 20px; }
        .btn { width: 70px; height: 70px; background: rgba(0,255,0,0.1); border: 2px solid #0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: #0f0; box-shadow: 0 0 15px rgba(0,255,0,0.4); }
        .up { grid-column: 2; } .left { grid-column: 1; } .down { grid-column: 2; } .right { grid-column: 3; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="score">SCORE: <span id="sc">0</span></div>
        <div class="bar-bg"><div id="hp"></div></div>
    </div>
    <canvas id="c"></canvas>
    <div class="controls">
        <div class="btn up" ontouchstart="m('u')">↑</div>
        <div class="btn left" ontouchstart="m('l')">←</div>
        <div class="btn down" ontouchstart="m('d')">↓</div>
        <div class="btn right" ontouchstart="m('r')">→</div>
    </div>
    <script>
        const c=document.getElementById('c'), x=c.getContext('2d');
        c.width=window.innerWidth*2; c.height=(window.innerHeight*0.75)*2;
        let s=0, h=100, live=true;
        let p={x:c.width/2, y:c.height/2}, w={x:50, y:50}, f={x:c.width/1.5, y:c.height/1.5};
        let t=Array.from({length:8},()=>({x:Math.random()*c.width, y:Math.random()*c.height, sz:150}));

        function draw() {
            if(!live) return;
            x.fillStyle="#031003"; x.fillRect(0,0,c.width,c.height);
            // Draw Trees
            t.forEach(i=>{ x.font=i.sz+"px serif"; x.fillText("🌲",i.x,i.y); });
            // Draw Campfire
            x.font="120px serif"; x.shadowBlur=30; x.shadowColor="orange";
            x.fillText("🔥",f.x,f.y); x.shadowBlur=0;
            // Wolf AI
            let dx=p.x-w.x, dy=p.y-w.y, d=Math.sqrt(dx*dx+dy*dy);
            let fDx=p.x-f.x, fDy=p.y-f.y, fD=Math.sqrt(fDx*fDx+fDy*fDy);
            w.x+=dx/45; w.y+=dy/45;
            x.font="110px serif"; x.fillText("🐺",w.x,w.y);
            x.fillText("🏃‍♂️",p.x,p.y);
            // Damage Logic (Safe near Fire)
            if(d<80 && fD>150) { h-=0.5; document.getElementById('hp').style.width=h+"%"; }
            if(h<=0) { live=false; alert("GAME OVER! DOCTOR DARK SCORE: "+s); location.reload(); }
            s++; document.getElementById('sc').innerText=Math.floor(s/10);
            requestAnimationFrame(draw);
        }
        function m(v) {
            const st=60;
            if(v=='u' && p.y>100) p.y-=st; if(v=='d' && p.y<c.height-100) p.y+=st;
            if(v=='l' && p.x>100) p.x-=st; if(v=='r' && p.x<c.width-100) p.x+=st;
        }
        draw();
    </script>
</body>
</html>
