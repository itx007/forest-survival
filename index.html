
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr Dark Forest</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; text-align: center; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; background: #001a00; margin: 0 auto; border: 2px solid #0f0; }
        #ui { position: fixed; top: 10px; width: 100%; font-weight: bold; }
        .controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 15px; }
        button { padding: 20px; font-size: 20px; background: #222; color: #0f0; border: 2px solid #0f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="ui">DOCTOR DARK SURVIVAL | SCORE: <span id="sc">0</span></div>
    <canvas id="g"></canvas>
    <div class="controls">
        <button ontouchstart="m('l')">⬅️</button>
        <button ontouchstart="m('u')">⬆️</button>
        <button ontouchstart="m('d')">⬇️</button>
        <button ontouchstart="m('r')">➡️</button>
    </div>
    <script>
        const c=document.getElementById('g'), x=c.getContext('2d');
        c.width=window.innerWidth; c.height=window.innerHeight-150;
        let p={x:c.width/2, y:c.height/2, s:0};
        function draw() {
            x.clearRect(0,0,c.width,c.height);
            x.fillStyle='#0f0'; x.fillRect(p.x,p.y,30,30);
            requestAnimationFrame(draw);
        }
        function m(d) {
            if(d=='l')p.x-=25; if(d=='r')p.x+=25;
            if(d=='u')p.y-=25; if(d=='d')p.y+=25;
            document.getElementById('sc').innerText = ++p.s;
        }
        draw();
    </script>
</body>
</html>
