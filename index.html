<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr Dark: Leaderboard Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body { margin: 0; background: #000; font-family: 'Orbitron', sans-serif; overflow: hidden; color: #fff; }
        #ui { position: absolute; top: 0; width: 100%; padding: 10px; z-index: 20; background: rgba(0,0,0,0.9); border-bottom: 2px solid #0f0; }
        .branding { font-size: 0.7rem; color: #0f0; text-shadow: 0 0 10px #0f0; letter-spacing: 2px; text-align: center; }
        .stats { display: flex; justify-content: space-around; font-size: 1.2rem; margin: 5px 0; font-weight: bold; }
        #leaderboard { font-size: 0.6rem; color: #ff0; text-align: center; margin-top: 5px; }
        .hb-container { width: 70%; height: 10px; background: #222; border: 1px solid #0f0; border-radius: 5px; margin: 5px auto; overflow: hidden; }
        #hp { width: 100%; height: 100%; background: linear-gradient(90deg, #f00, #0f0); transition: 0.2s; }
        canvas { display: block; width: 100%; height: 55vh; }
        .shop { background: #111; padding: 8px; display: flex; justify-content: center; gap: 5px; border-top: 1px solid #0f0; }
        .shop-btn { padding: 6px 8px; background: rgba(0,255,0,0.1); border: 1px solid #0f0; color: #0f0; font-size: 0.6rem; border-radius: 4px; font-family: 'Orbitron'; }
        .controls { position: absolute; bottom: 2%; width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; }
        .btn { width: 55px; height: 55px; background: rgba(0,255,0,0.1); border: 1.5px solid #0f0; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; color: #0f0; }
        .shoot-btn { width: 75px; height: 75px; background: rgba(255,0,0,0.2); border-color: #f00; color: #f00; border-radius: 50%; font-size: 1.8rem; box-shadow: 0 0 15px #f00; }
        .up { grid-column: 2; } .left { grid-column: 1; } .down { grid-column: 2; } .right { grid-column: 3; } .shoot { grid-column: 2; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="branding">DOCTOR DARK • V11 GLOBAL</div>
        <div class="stats">
            <div>SC: <span id="sc">0</span></div>
            <div>💰: <span id="coins">0</span></div>
        </div>
        <div class="hb-container"><div id="hp"></div></div>
        <div id="leaderboard">BEST: <span id="best">0</span> (Dr Dark)</div>
    </div>
    <div style="height: 18vh;"></div>
    <canvas id="c"></canvas>
    <div class="shop">
        <button class="shop-btn" onclick="buy('gun')">GUN UP (50💰)</button>
        <button class="shop-btn" onclick="buy('nitro')">NITRO (100💰)</button>
    </div>
    <div class="controls">
        <div class="btn up" ontouchstart="m('u')">▲</div>
        <div class="btn left" ontouchstart="m('l')">◀</div>
        <div class="btn down" ontouchstart="m('d')">▼</div>
        <div class="btn right" ontouchstart="m('r')">▶</div>
        <div class="btn shoot-btn shoot" ontouchstart="shoot()">🔥</div>
    </div>

    <script>
        const c=document.getElementById('c'), x=c.getContext('2d');
        const ac = new (window.AudioContext || window.webkitAudioContext)();
        c.width=window.innerWidth*2; c.height=(window.innerHeight*0.55)*2;

        let s=0, h=100, live=true, b=null, night=false, totalCoins=0, frame=0;
        let gunLevel=1, nitroActive=false, bestScore = localStorage.getItem('drDarkBest') || 0;
        document.getElementById('best').innerText = bestScore;

        let p={x:c.width/2, y:c.height/2};
        let wolves=[{x:200, y:200}, {x:c.width-200, y:c.height-200}]; 
        let f={x:c.width-300, y:c.height-300}, coin={x:400, y:400}, house={x:250, y:250}, car={x:c.width-400, y:250, drive:false};
        let med={x:Math.random()*c.width, y:Math.random()*c.height, active:true};
        let t=Array.from({length:10},()=>({x:Math.random()*c.width, y:Math.random()*c.height, sz:140}));

        function sound(freq, type, dur) {
            let osc = ac.createOscillator(); let g = ac.createGain();
            osc.type = type; osc.frequency.value = freq;
            osc.connect(g); g.connect(ac.destination);
            osc.start(); g.gain.exponentialRampToValueAtTime(0.00001, ac.currentTime + dur);
            osc.stop(ac.currentTime + dur);
        }

        setInterval(() => { night = !night; if(night) sound(120, 'sine', 0.5); }, 20000);

        function draw() {
            if(!live) return;
            frame++;
            x.fillStyle="#000"; x.fillRect(0,0,c.width,c.height);
            let wobble = Math.sin(frame * 0.1) * 8;
            let grad = x.createRadialGradient(p.x, p.y, 50, p.x, p.y, night?400:1200);
            grad.addColorStop(0, night ? 'rgba(70,70,0,0.5)' : 'rgba(0,60,0,0.3)');
            grad.addColorStop(1, '#000');
            x.fillStyle = grad; x.fillRect(0,0,c.width,c.height);

            t.forEach(i=>{ x.font=i.sz+"px serif"; x.fillText("🌲",i.x,i.y); });
            x.font="170px serif"; x.fillText("🏠",house.x,house.y);
            x.font="130px serif"; x.fillText("🔥",f.x,f.y + (wobble/2));
            x.font="100px serif"; x.fillText("💰",coin.x,coin.y + wobble);
            if(med.active){ x.font="90px serif"; x.fillText("💊",med.x,med.y - wobble); }
            if(!car.drive) { x.font="135px serif"; x.fillText("🏎️",car.x,car.y); }

            let inH = Math.sqrt((p.x-house.x-70)**2+(p.y-house.y+70)**2)<150;
            let nearF = Math.sqrt((p.x-f.x)**2+(p.y-f.y)**2)<200;
            if(!car.drive && Math.sqrt((p.x-car.x)**2+(p.y-car.y)**2)<120) { car.drive=true; sound(180, 'sawtooth', 0.4); }
            
            if(med.active && Math.sqrt((p.x-med.x)**2+(p.y-med.y)**2)<100){ 
                h=Math.min(100, h+35); med.active=false; sound(800, 'sine', 0.3);
                setTimeout(()=>med.active=true, 15000); 
            }

            wolves.forEach(w => {
                let dx=p.x-w.x, dy=p.y-w.y, d=Math.sqrt(dx*dx+dy*dy);
                if(!inH) { w.x+=dx/(night?30:60); w.y+=dy/(night?30:60); }
                x.font = "140px serif"; x.fillText("🐺", w.x, w.y + wobble);
                if(d < 120 && !inH && !nearF && !car.drive) { 
                    h-=3; sound(60, 'square', 0.1); 
                    if(navigator.vibrate) navigator.vibrate(50);
                }
            });

            x.font="145px serif"; x.fillText(car.drive ? "🏎️" : "🏃‍♂️", p.x, p.y + (car.drive ? 0 : wobble));

            if(b) {
                b.x+=b.vx; b.y+=b.vy; x.fillStyle=gunLevel>1 ? "#0ff" : "#f00"; 
                x.beginPath(); x.arc(b.x,b.y,25,0,Math.PI*2); x.fill();
                wolves.forEach((w, i) => {
                    if(Math.sqrt((b.x-w.x)**2+(b.y-w.y)**2)<130) { 
                        s+=5000; sound(400, 'square', 0.15);
                        wolves[i]={x:Math.random()*c.width, y:0}; b=null; 
                    }
                });
                if(b && (b.x<0||b.x>c.width||b.y<0||b.y>c.height)) b=null;
            }

            if(Math.sqrt((p.x-coin.x)**2+(p.y-coin.y)**2)<110) { 
                totalCoins+=10; sound(1100, 'sine', 0.1);
                coin={x:Math.random()*c.width, y:Math.random()*c.height}; 
                document.getElementById('coins').innerText=totalCoins; 
            }
            if(inH && h<100) h+=0.5;
            document.getElementById('hp').style.width=h+"%";
            
            if(h<=0) { 
                live=false; 
                let finalScore = Math.floor(s/10);
                if(finalScore > bestScore) localStorage.setItem('drDarkBest', finalScore);
                alert("GAME OVER! SCORE: "+finalScore); location.reload(); 
            }
            s++; document.getElementById('sc').innerText=Math.floor(s/10);
            if(Math.floor(s/10) % 500 === 0 && s > 0) sound(1500, 'sine', 0.2);
            requestAnimationFrame(draw);
        }

        function m(v) {
            let sp = car.drive ? (nitroActive ? 300 : 220) : 110;
            if(v=='u' && p.y>100) p.y-=sp; if(v=='d' && p.y<c.height-100) p.y+=sp;
            if(v=='l' && p.x>100) p.x-=sp; if(v=='r' && p.x<c.width-100) p.x+=sp;
        }

        function buy(item) {
            if(item=='gun' && totalCoins>=50) { gunLevel=2; totalCoins-=50; alert("LASER GUN!"); }
            if(item=='nitro' && totalCoins>=100) { nitroActive=true; totalCoins-=100; alert("NITRO CAR!"); }
            document.getElementById('coins').innerText=totalCoins;
        }

        function shoot() {
            if(car.drive) { car.drive=false; car.x=p.x+180; car.y=p.y; return; }
            if(!b) {
                sound(550, 'square', 0.1);
                let bSpeed = gunLevel > 1 ? 4 : 8;
                b={x:p.x, y:p.y, vx:(wolves[0].x-p.x)/bSpeed, vy:(wolves[0].y-p.y)/bSpeed};
            }
        }
        draw();
    </script>
</body>
</html>
