<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr Dark: Zombie Hunter V19</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body { margin: 0; background: #000; font-family: 'Orbitron', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        #ui { position: absolute; top: 0; width: 100%; padding: 5px; z-index: 50; background: rgba(0,0,0,0.9); border-bottom: 2px solid #0f0; }
        .stats { display: flex; justify-content: space-between; padding: 0 10px; font-size: 0.8rem; color: #0f0; }
        .hb-container { width: 95%; height: 6px; background: #222; margin: 5px auto; border: 1px solid #0f0; border-radius: 3px; }
        #hp { width: 100%; height: 100%; background: #0f0; transition: 0.3s; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; }
        .controls { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 100; pointer-events: none; }
        .move-grid { display: grid; grid-template-columns: repeat(3, 45px); gap: 5px; pointer-events: auto; }
        .fire-zone { pointer-events: auto; }
        .btn { background: rgba(0,255,0,0.1); border: 1.5px solid #0f0; border-radius: 10px; color: #0f0; display: flex; align-items: center; justify-content: center; width: 45px; height: 45px; font-size: 1.2rem; }
        .btn-fire { width: 75px; height: 75px; background: rgba(0,255,255,0.2); border: 2.5px solid #0ff; border-radius: 50%; color: #0ff; font-size: 1.8rem; box-shadow: 0 0 15px #0ff; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stats"><div>SC: <span id="sc">0</span></div><div>💰: <span id="coins">0</span></div></div>
        <div class="hb-container"><div id="hp"></div></div>
    </div>
    <canvas id="c"></canvas>
    <div class="controls">
        <div class="move-grid">
            <div style="grid-column:2" class="btn" ontouchstart="m('u')">▲</div>
            <div style="grid-column:1" class="btn" ontouchstart="m('l')">◀</div>
            <div style="grid-column:3" class="btn" ontouchstart="m('r')">▶</div>
            <div style="grid-column:2" class="btn" ontouchstart="m('d')">▼</div>
        </div>
        <div class="fire-zone"><div class="btn btn-fire" ontouchstart="shoot()">💦</div></div>
    </div>

    <script>
        const c=document.getElementById('c'), x=c.getContext('2d');
        c.width=window.innerWidth*2; c.height=window.innerHeight*2;
        let s=0, h=100, live=true, b=null, totalCoins=0, p={x:c.width/2, y:c.height/2};
        let enemies=[{x:-300,y:-300,t:'🐺'}, {x:c.width+300,y:c.height+300,t:'🧟'}];
        let obj={coin:{x:1000,y:1000}, h:{x:400,y:400}, fire:{x:c.width-400,y:c.height-400}};

        function draw() {
            if(!live) return;
            x.fillStyle="#000"; x.fillRect(0,0,c.width,c.height);
            x.font="160px serif"; x.fillText("🏠", obj.h.x, obj.h.y);
            x.fillText("🔥", obj.fire.x, obj.fire.y);
            x.font="120px serif"; x.fillText("💰", obj.coin.x, obj.coin.y);
            x.font="150px serif"; x.fillText("🏃‍♂️", p.x, p.y);

            enemies.forEach((e, i) => {
                let dx=p.x-e.x, dy=p.y-e.y, dist=Math.sqrt(dx*dx+dy*dy);
                // Zombie speed decreases near Fire or House
                let speed = (dist < 400 && (Math.sqrt((e.x-obj.fire.x)**2+(e.y-obj.fire.y)**2)<350)) ? 180 : 85;
                e.x+=dx/speed; e.y+=dy/speed;
                x.fillText(e.t, e.x, e.y);
                if(dist<110) h-=0.4;
            });

            if(b) {
                b.x+=b.vx; b.y+=b.vy; x.fillStyle="#0ff";
                x.beginPath(); x.arc(b.x,b.y,25,0,Math.PI*2); x.fill();
                enemies.forEach((e,i)=>{
                    if(Math.sqrt((b.x-e.x)**2+(b.y-e.y)**2)<150) { 
                        s+=5000; // Repel effect: Push enemy away
                        enemies[i].x = Math.random() > 0.5 ? -200 : c.width+200;
                        enemies[i].y = Math.random() * c.height;
                        b=null; 
                    }
                });
                if(b&&(b.x<0||b.x>c.width||b.y<0||b.y>c.height)) b=null;
            }

            if(Math.sqrt((p.x-obj.coin.x)**2+(p.y-obj.coin.y)**2)<120) {
                totalCoins+=10; obj.coin={x:Math.random()*c.width,y:Math.random()*c.height};
                document.getElementById('coins').innerText=totalCoins;
            }

            document.getElementById('hp').style.width=h+"%";
            if(h<=0) { live=false; alert("GAME OVER! SCORE: "+Math.floor(s/10)); location.reload(); }
            s++; document.getElementById('sc').innerText=Math.floor(s/10);
            requestAnimationFrame(draw);
        }

        function m(v) {
            let sp=140; // Increased player speed
            if(v=='u' && p.y>100) p.y-=sp; if(v=='d' && p.y<c.height-100) p.y+=sp; 
            if(v=='l' && p.x>100) p.x-=sp; if(v=='r' && p.x<c.width-100) p.x+=sp;
        }

        function shoot() {
            if(!b) {
                // Auto-aim at closest enemy
                let target = enemies[0];
                b={x:p.x, y:p.y, vx:(target.x-p.x)/8, vy:(target.y-p.y)/8};
            }
        }
        draw();
    </script>
</body>
</html>
